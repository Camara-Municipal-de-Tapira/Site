<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="pt" lang="pt"
      metal:use-macro="here/main_template/macros/master">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="style.css">
      </head>
<body>

    <h1>Atas das Reuniões</h1>

    <p>Pesquise as atas das reuniões ordinárias, extraordinárias e solenes.</br>
    Você também pode baixar as atas em pdf em seu computador ou celular.</br>
    Selecione um ano na caixinha abaixo e clique em pesquisar.</br>
    </p>

    <div class="pesquisa-atas">
      <label for="ano-ata"><strong>Ano:</strong></label>

      <select id="ano-ata" class="caixa-selecao">
        <option value="">Selecione</option>
      </select>
      <button type="button" id="btn-pesquisar" class="botao-pesquisar">Pesquisar</button>
    </div>

    <div id="lista-sessoes"></div>

    <script src="script.js"></script>
</body>
</html>
