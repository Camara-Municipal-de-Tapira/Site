<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauta de Reunião</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script type="module" src="ultimasessao.js"></script>

    <h1 id="titulo-pagina">Pauta da reunião</h1>
        <h1 class="documentFirstHeading" id="titulo-sessao">Pesquise as pautas de reunião</h1>

        <select id="select-ano" style="margin-bottom: 20px; padding: 5px; font-size: 1em;">
            <option value="">Selecione o ano</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>            
        </select>

        <select id="select-mes" style="margin-bottom: 20px; padding: 5px; font-size: 1em; margin-left: 10px;">
            <option value="">Selecione o mês</option>
            <option value="01">Janeiro</option>
            <option value="02">Fevereiro</option>
            <option value="03">Março</option>
            <option value="04">Abril</option>
            <option value="05">Maio</option>
            <option value="06">Junho</option>
            <option value="07">Julho</option>
            <option value="08">Agosto</option>
            <option value="09">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>

        <select id="select-dia" style="margin-bottom: 20px; padding: 5px; font-size: 1em; margin-left: 10px;">
            <option value="">Selecione o dia</option>
            <option value="01">01</option>
            <option value="02">02</option>
            <option value="03">03</option>
            <option value="04">04</option>
            <option value="05">05</option>
            <option value="06">06</option>
            <option value="07">07</option>
            <option value="08">08</option>
            <option value="09">09</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
            <option value="19">19</option>
            <option value="20">20</option>
            <option value="21">21</option>
            <option value="22">22</option>
            <option value="23">23</option>
            <option value="24">24</option>
            <option value="25">25</option>
            <option value="26">26</option>
            <option value="27">27</option>
            <option value="28">28</option>
            <option value="29">29</option>
            <option value="30">30</option>
            <option value="31">31</option>
        </select>

        <select id="select-tipo" style="margin-bottom: 20px; padding: 5px; font-size: 1em; margin-left: 10px;">
            <option value="">Selecione o tipo de reunião</option>
            <option value="1">Reunião Ordinária</option>
            <option value="2">Reunião Extraordinária</option>
            <option value="3">Reunião Solene</option>
        </select>

        <p><button id="btn-pesquisar" style="padding: 10px 20px; font-size: 1em; background-color: #007bff; color: white; border: none; cursor: pointer;">Pesquisar</button></p>

        <p><button id="btn-limpar" style="padding: 10px 20px; font-size: 1em; background-color: #6c757d; color: white; border: none; cursor: pointer;">Limpar</button></p>

        <div id="lista-sessoes"></div>

        <div id="detalhes-reuniao" style="display: none;">
            <p id="data-sessao" style="color: #666; font-size: 1.1em; margin-bottom: 20px;">
                Buscando informações da última sessão...
            </p>

            <p id="impressao-pauta">Impressão da pauta em PDF</p>     
            <h2 class="secao-pauta">Indicações e Requerimentos</h2>
            <div id="conteudo-expediente" class="container-cards"></div>

            <h2 class="secao-pauta">Votação (Ordem do Dia)</h2>
            <div id="conteudo-ordem-dia" class="container-cards"></div>
        </div>
</body>
</html>
